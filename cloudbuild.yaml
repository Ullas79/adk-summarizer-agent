# cloudbuild.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Cloud Build CI/CD pipeline for the ADK Summarizer Agent.
#
# Triggered automatically on push to `main` branch (configure the trigger in
# Cloud Build > Triggers in the Console, or with the gcloud command in README).
#
# Pipeline steps:
#   1. Build Docker image
#   2. Push to Artifact Registry
#   3. Deploy to Cloud Run
#   4. (Optional) smoke-test the live /health endpoint
#
# Substitution variables (set in the Cloud Build trigger or pass with --substitutions):
#   _REGION          : GCP region, default us-central1
#   _SERVICE_NAME    : Cloud Run service name
#   _REPOSITORY      : Artifact Registry repository name
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: adk-summarizer-agent
  _REPOSITORY: cloud-run-agents

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Build ─────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest
      - .

  # ── 2. Push ──────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}

  # ── 3. Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SERVICE_NAME}-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=1,STRICT_JSON_OUTPUT=true,CORS_ALLOW_ORIGINS=*
      - --quiet

  # ── 4. Smoke test ────────────────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: smoke-test
    waitFor: [deploy]
    entrypoint: bash
    args:
      - -c
      - |
        URL=$(gcloud run services describe ${_SERVICE_NAME} \
                --region=${_REGION} \
                --format='value(status.url)')
        echo "Service URL: $$URL"
        STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$$URL/health")
        echo "Health check status: $$STATUS"
        [ "$$STATUS" = "200" ] || (echo "Health check FAILED" && exit 1)
        echo "Smoke test PASSED ✓"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest
