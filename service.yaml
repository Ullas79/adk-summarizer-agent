# service.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Declarative Cloud Run service definition.
#
# Deploy with:
#   gcloud run services replace service.yaml --region=us-central1
#
# Replace the placeholders:
#   YOUR_PROJECT_ID   → your GCP project ID
#   YOUR_REGION       → e.g. us-central1
#   YOUR_IMAGE_TAG    → image digest or tag from Artifact Registry
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: adk-summarizer-agent
  labels:
    app: adk-summarizer-agent
    team: ml-platform
  annotations:
    run.googleapis.com/launch-stage: GA

spec:
  template:
    metadata:
      annotations:
        # ── Scaling ───────────────────────────────────────────────────────────
        autoscaling.knative.dev/minScale: "1"       # keep one warm instance
        autoscaling.knative.dev/maxScale: "10"
        # ── CPU & startup ─────────────────────────────────────────────────────
        run.googleapis.com/cpu-throttling: "false"  # CPU always allocated
        run.googleapis.com/startup-cpu-boost: "true"

    spec:
      serviceAccountName: adk-summarizer-agent-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com
      timeoutSeconds: 120
      containerConcurrency: 80

      containers:
        - image: YOUR_REGION-docker.pkg.dev/YOUR_PROJECT_ID/cloud-run-agents/adk-summarizer-agent:YOUR_IMAGE_TAG

          ports:
            - name: http1
              containerPort: 8080

          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: YOUR_PROJECT_ID
            - name: GOOGLE_CLOUD_LOCATION
              value: YOUR_REGION
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "1"
            - name: LOG_LEVEL
              value: INFO
            - name: STRICT_JSON_OUTPUT
              value: "true"
            - name: CORS_ALLOW_ORIGINS
              value: "*"

          resources:
            limits:
              cpu: "2"
              memory: 1Gi

          # ── Probes ─────────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /ready
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12        # allow up to 60 s for startup

  traffic:
    - percent: 100
      latestRevision: true
